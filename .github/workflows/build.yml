name: Build

on:
  push:
    paths-ignore:
      - 'readme.md'
    branches:
      - main
  pull_request:
    paths-ignore:
      - 'readme.md'
    branches:
      - main

permissions:
  contents: read

env:
  FINAL_IMAGE: henkmeulekamp/pop3-forwarding

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PRs: build only, no secrets, no registry login
      - name: Build x86_64 (no push)
        if: ${{ github.event_name == 'pull_request' || github.actor == 'dependabot[bot]' }}
        run: |
          docker build -f Dockerfile --platform linux/amd64 \
            -t ${FINAL_IMAGE}:${GITHUB_SHA} \
            -t ${FINAL_IMAGE}:x86_64 \
            .

      # Push to main: login + push
      - name: Login to Docker Hub
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to DGU
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build x86_64 and push
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        run: |
          docker build -f Dockerfile --platform linux/amd64 \
            -t ${FINAL_IMAGE}:${GITHUB_SHA} \
            -t ${FINAL_IMAGE}:x86_64 \
            --push \
            .

      - run: echo "done" > success-build-${{ github.sha }}