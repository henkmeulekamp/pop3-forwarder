name: Build-arm64

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FINAL_IMAGE: henkmeulekamp/pop3-forwarding

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      # Build-only for non-main (no registry login, no secrets)
      - name: Build arm64 (no push)
        if: ${{ github.ref_name != 'main' || github.actor == 'dependabot[bot]' }}
        run: |
          docker build -f Dockerfile --platform linux/arm64 \
            -t ${FINAL_IMAGE}:${GITHUB_SHA} \
            -t ${FINAL_IMAGE}:arm64 \
            .

      # Login and push only from main and only by you (adjust if you have other trusted maintainers)
      - name: Login to Docker Hub
        if: ${{ github.ref_name == 'main' && github.actor == 'henkmeulekamp' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to DGU
        if: ${{ github.ref_name == 'main' && github.actor == 'henkmeulekamp' }}
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build arm64 and push
        if: ${{ github.ref_name == 'main' && github.actor == 'henkmeulekamp' }}
        run: |
          docker build -f Dockerfile --platform linux/arm64 \
            -t ${FINAL_IMAGE}:${GITHUB_SHA} \
            -t ${FINAL_IMAGE}:arm64 \
            --push \
            .

      - run: echo "done" > success-build-${{ github.sha }}
